<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>疯狂食物链 - 视觉重制 V11</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #d8e3d6; 
            touch-action: none; overscroll-behavior: none; user-select: none; font-family: 'Segoe UI', sans-serif;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #top-bar {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 400px; text-align: center;
        }
        #status-text { color: #333; font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 0px rgba(255,255,255,0.8); margin-bottom: 8px; }
        #progress-bg {
            width: 100%; height: 24px; background: rgba(0,0,0,0.2);
            border-radius: 12px; border: 3px solid #fff; overflow: hidden; position: relative;
        }
        #progress-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.1s ease-out; }
        #progress-text {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 14px; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #joystick-zone {
            position: absolute; bottom: max(40px, env(safe-area-inset-bottom, 40px)); left: max(30px, env(safe-area-inset-left, 30px));
            width: 130px; height: 130px; background: rgba(255, 255, 255, 0.3);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); pointer-events: auto; backdrop-filter: blur(4px);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #dash-btn {
            position: absolute; bottom: max(60px, env(safe-area-inset-bottom, 60px)); right: max(30px, env(safe-area-inset-right, 30px));
            width: 80px; height: 80px; background: #f1c40f;
            border-radius: 50%; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: auto; display: flex; justify-content: center; align-items: center; font-size: 26px; color: white; font-weight: bold;
        }
        #dash-btn:active { transform: scale(0.95); }
        #dash-cd {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 50%;
            display: none; justify-content: center; align-items: center; font-size: 24px; color: #fff;
        }
        
        #death-modal-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0, 0, 0, 0.5);
            display: none; justify-content: center; align-items: center; pointer-events: auto; z-index: 999; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #fff; width: 80vw; max-width: 350px; border-radius: 20px; padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid #34495e;
        }
        .modal-title { color: #e74c3c; font-size: 32px; font-weight: 900; margin-top: 0; margin-bottom: 10px; }
        .modal-desc { color: #7f8c8d; font-size: 16px; margin-bottom: 30px; font-weight: bold; }
        .btn {
            display: block; width: 100%; padding: 16px 0; margin-bottom: 15px; font-size: 20px; font-weight: 900; border: none; border-radius: 30px; box-sizing: border-box; cursor: pointer;
        }
        .btn-revive { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="top-bar">
            <div id="status-text">小鸡 - 努力吃豆子进化！</div>
            <div id="progress-bg"><div id="progress-fill"></div><div id="progress-text">0 / 100</div></div>
        </div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="dash-btn">闪<div id="dash-cd"></div></div>
    </div>
    <div id="death-modal-overlay">
        <div class="modal-box">
            <h1 class="modal-title">被吃掉了！</h1>
            <p class="modal-desc">利用无敌时间去捡漏报仇！</p>
            <button class="btn btn-revive" onclick="revivePlayer()">▶ 重新开始 (带保护伞)</button>
        </div>
    </div>

<script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    const TYPE = { CHICKEN: 1, FOX: 2, WOLF: 3, CROC: 4, DINO: 5 };
    const GLOBAL_SPEED = 4.5; const MAP_SIZE = 4000; const INVINCIBLE_TIME = 15 * 60; const MAX_RUNES = 12;

    let camera = { x: 0, y: 0 }; let player = {};
    let bushes = [], crates = [], stones = [], foods = [], runes = [], aiList = [];
    let floatingTexts = []; let flyingExp = []; 
    let gameActive = true; let aiIdCounter = 1; let nemesisId = null; 

    // 动物对应的专属主色调
    const COLORS = {
        CHICKEN: "#f1c40f", // 真正的黄色小鸡
        FOX: "#eb7c25", FOX_OUT: "#b95311",
        WOLF: "#878f9b", WOLF_OUT: "#5a626c",
        CROC: "#6f9f59", CROC_OUT: "#466b35",
        DINO: "#8d9964", DINO_OUT: "#5d673f" 
    };

    function getSafeSpawn(radius) {
        let x, y, safe = false, attempts = 0;
        while (!safe && attempts < 150) {
            x = 200 + Math.random() * (MAP_SIZE - 400); y = 200 + Math.random() * (MAP_SIZE - 400);
            safe = !isColliding(x, y, radius); attempts++;
        }
        return { x: x, y: y };
    }

    function isColliding(x, y, r) {
        if(x - r < 0 || x + r > MAP_SIZE || y - r < 0 || y + r > MAP_SIZE) return true;
        for (let c of crates) {
            let tx = x, ty = y;
            if (x < c.x) tx = c.x; else if (x > c.x + c.w) tx = c.x + c.w;
            if (y < c.y) ty = c.y; else if (y > c.y + c.h) ty = c.y + c.h;
            if (Math.hypot(x - tx, y - ty) < r) return true;
        }
        for (let s of stones) { if (Math.hypot(x - s.x, y - s.y) < r + s.radius) return true; }
        return false;
    }
    function circleIntersect(c1, c2) { return Math.hypot(c1.x - c2.x, c1.y - c2.y) < (c1.radius + (c2.radius || 10)); }

    function spawnDynamicRune() {
        if (runes.length >= MAX_RUNES) return;
        let maxTier = player.type; 
        for(let ai of aiList) { if(ai.type > maxTier) maxTier = ai.type; }
        let allowed = [TYPE.FOX];
        if (maxTier >= TYPE.FOX) allowed.push(TYPE.WOLF);
        if (maxTier >= TYPE.WOLF) allowed.push(TYPE.CROC);
        if (maxTier >= TYPE.CROC) allowed.push(TYPE.DINO);
        let chosenType = allowed[Math.floor(Math.random() * allowed.length)];
        let pos = getSafeSpawn(20);
        runes.push({ x: pos.x, y: pos.y, rType: chosenType, createTime: Date.now() });
    }

    function dropLoot(x, y, tier) {
        let count = tier * 12; 
        for(let i=0; i<count; i++) {
            if (foods.length > 500) break; 
            let offsetX = (Math.random() - 0.5) * tier * 50;
            let offsetY = (Math.random() - 0.5) * tier * 50;
            foods.push({ x: x + offsetX, y: y + offsetY, val: 5 }); 
        }
    }

    function spawnAI(type) {
        let props = getEntityProps(type); let pos = getSafeSpawn(props.r);
        aiList.push({
            id: aiIdCounter++, type: type, x: pos.x, y: pos.y, 
            vx: 0, vy: 0, faceX: 1, faceY: 0, speed: GLOBAL_SPEED, radius: props.r, state: 'wander'
        });
    }

    function initEnvironment() {
        bushes = []; crates = []; stones = []; foods = []; runes = []; aiList = []; nemesisId = null; flyingExp = [];
        
        for(let i=0; i<30; i++) bushes.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, r: 80+Math.random()*60 });
        for(let i=0; i<150; i++) foods.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, val: 3 });
        
        for(let i=0; i<40; i++) spawnAI(TYPE.CHICKEN);
        for(let i=0; i<MAX_RUNES; i++) spawnDynamicRune();
    }

    function getNeedExp(tier) {
        if(tier === 1) return 100; if(tier === 2) return 300;
        if(tier === 3) return 800; if(tier === 4) return 1500; return 9999;
    }

    function getEntityProps(type) {
        if(type === 1) return { r: 16, name: "小鸡", color: COLORS.CHICKEN }; 
        if(type === 2) return { r: 24, name: "赤狐", color: COLORS.FOX };
        if(type === 3) return { r: 28, name: "灰狼", color: COLORS.WOLF };
        if(type === 4) return { r: 35, name: "巨鳄", color: COLORS.CROC };
        if(type === 5) return { r: 45, name: "三角龙", color: COLORS.DINO };
        return { r: 16 };
    }

    function revivePlayer() {
        document.getElementById('death-modal-overlay').style.display = 'none';
        let safePos = getSafeSpawn(16);
        player = {
            x: safePos.x, y: safePos.y, radius: 16, speed: GLOBAL_SPEED, type: TYPE.CHICKEN,
            faceX: 1, faceY: 0, dashCooldown: 0, dashMaxCd: 180, flashEffects: [],
            tempTimer: 0, tempMaxTime: 20 * 60, exp: 0, inBush: false, isTemp: false,
            invincibleTimer: INVINCIBLE_TIME 
        };
        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;
        gameActive = true; 
        document.getElementById('progress-fill').style.background = COLORS.CHICKEN;
        document.getElementById('dash-btn').style.background = COLORS.CHICKEN;
        updateUI("复活无敌中！去吃豆子或符文！", "#333"); refreshProgressUI();
    }

    let joyActive = false; let joyVector = { x: 0, y: 0 };
    const joyZone = document.getElementById('joystick-zone'); const joyKnob = document.getElementById('joystick-knob');
    function handleJoy(e) {
        if(e) e.preventDefault();
        if(e.type === 'touchend' || e.type === 'mouseup') { joyActive = false; joyVector = {x: 0, y: 0}; joyKnob.style.transform = `translate(-50%, -50%)`; return; }
        joyActive = true;
        let cx = e.touches ? e.touches[0].clientX : e.clientX; let cy = e.touches ? e.touches[0].clientY : e.clientY;
        let r = joyZone.getBoundingClientRect(); let dx = cx - (r.left + r.width/2); let dy = cy - (r.top + r.height/2);
        let dist = Math.hypot(dx, dy); if (dist > 50) { dx = (dx/dist)*50; dy = (dy/dist)*50; }
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joyVector.x = dx / 50; joyVector.y = dy / 50;
    }
    joyZone.addEventListener('touchstart', handleJoy); joyZone.addEventListener('touchmove', handleJoy); joyZone.addEventListener('touchend', handleJoy);

    const dashCdUI = document.getElementById('dash-cd');
    document.getElementById('dash-btn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if(player.dashCooldown <= 0 && gameActive) {
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, type: player.type, alpha: 1.0 });
            let flashDist = player.radius * 6; 
            let finalX = player.x; let finalY = player.y;
            for(let i=0; i<flashDist; i+=10) {
                let tx = finalX + player.faceX * 10; let ty = finalY + player.faceY * 10;
                if(isColliding(tx, ty, player.radius)) break;
                finalX = tx; finalY = ty;
            }
            player.x = finalX; player.y = finalY;
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, type: player.type, alpha: 0.8 });
            player.dashCooldown = player.dashMaxCd; dashCdUI.style.display = 'flex';
        }
    });

    function showKillText(x, y, text, color, isBig = false) {
        floatingTexts.push({ x: x, y: y - 30, text: text, alpha: 1.0, color: color, font: `900 ${isBig ? "36px" : "22px"} 'Segoe UI'` });
    }

    function changePlayerType(newType, isTemp) {
        player.type = newType; player.isTemp = isTemp;
        let props = getEntityProps(newType); player.radius = props.r;
        
        document.getElementById('progress-fill').style.background = props.color;
        document.getElementById('dash-btn').style.background = props.color;

        if(isTemp) { player.tempTimer = player.tempMaxTime; updateUI(`化身 ${props.name}！倒计时开始！`, props.color); } 
        else { updateUI(`进化！永久 ${props.name}！`, props.color); }
        refreshProgressUI();
    }

    function update() {
        if(!gameActive) return;

        let moveX = joyActive ? joyVector.x : 0; let moveY = joyActive ? joyVector.y : 0;
        let len = Math.hypot(moveX, moveY);
        if (len > 0) { moveX /= len; moveY /= len; player.faceX = moveX; player.faceY = moveY; }

        if (!isColliding(player.x + moveX * player.speed, player.y, player.radius)) player.x += moveX * player.speed;
        if (!isColliding(player.x, player.y + moveY * player.speed, player.radius)) player.y += moveY * player.speed;

        if (player.dashCooldown > 0) {
            player.dashCooldown--; dashCdUI.innerText = Math.ceil(player.dashCooldown / 60);
            if(player.dashCooldown <= 0) dashCdUI.style.display = 'none';
        }
        if (player.invincibleTimer > 0) player.invincibleTimer--;

        for(let i = floatingTexts.length-1; i>=0; i--) { floatingTexts[i].y -= 1.5; floatingTexts[i].alpha -= 0.015; if(floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1); }
        for (let i = player.flashEffects.length - 1; i >= 0; i--) { player.flashEffects[i].alpha -= 0.06; if (player.flashEffects[i].alpha <= 0) player.flashEffects.splice(i, 1); }

        player.inBush = false;
        for (let b of bushes) { if (Math.hypot(player.x - b.x, player.y - b.y) < b.r) { player.inBush = true; break; } }

        if (player.isTemp) {
            player.tempTimer--;
            if (player.tempTimer <= 0) {
                let fallbackType = TYPE.CHICKEN; let tempExp = player.exp;
                if(tempExp >= getNeedExp(1)) { fallbackType = TYPE.FOX; tempExp -= getNeedExp(1); }
                if(tempExp >= getNeedExp(2)) { fallbackType = TYPE.WOLF; tempExp -= getNeedExp(2); }
                if(tempExp >= getNeedExp(3)) { fallbackType = TYPE.CROC; }
                changePlayerType(fallbackType, false);
                updateUI("体验结束，变回原形！", "#333");
            }
        }

        // 吃豆子并生成飞行动画
        for (let i = foods.length - 1; i >= 0; i--) {
            if (circleIntersect(player, {x: foods[i].x, y: foods[i].y, radius: 5})) {
                let val = foods[i].val;
                flyingExp.push({ x: foods[i].x, y: foods[i].y, val: val });
                foods.splice(i, 1); foods.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, val: 3 });
            }
        }

        // ★ 修复Bug的拾取符文逻辑 ★
        for (let i = runes.length - 1; i >= 0; i--) {
            let r = runes[i]; let eaten = false;
            
            if (circleIntersect(player, r)) {
                let canEat = false;
                if (r.rType > player.type) { 
                    canEat = true; // 永远可以吃比自己高级的
                } else if (r.rType === player.type && player.isTemp) {
                    canEat = true; // 只有“限时体验卡状态”才能吃同级符文重置时间
                } // 真正的永久动物，无视同级和低级符文！

                if (canEat) {
                    changePlayerType(r.rType, true); eaten = true;
                }
            }
            
            if (!eaten) {
                for(let ai of aiList) {
                    if (circleIntersect(ai, r) && r.rType > ai.type) {
                        ai.type = r.rType; ai.radius = getEntityProps(ai.type).r; eaten = true; break;
                    }
                }
            }
            if (eaten) { runes.splice(i, 1); setTimeout(()=> spawnDynamicRune(), 5000); }
        }

        for (let i = aiList.length - 1; i >= 0; i--) {
            let ai = aiList[i]; 
            let distToPlayer = Math.hypot(player.x - ai.x, player.y - ai.y);
            let canBeEatenByAI = (player.type < ai.type && player.invincibleTimer <= 0);
            
            if (distToPlayer < (player.radius + ai.radius + 200) && !player.inBush) {
                if (player.type > ai.type) { 
                    ai.state = 'flee'; let dirX = ai.x - player.x; let dirY = ai.y - player.y; let l = Math.hypot(dirX, dirY);
                    ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
                } else if (canBeEatenByAI) { 
                    ai.state = 'chase'; let dirX = player.x - ai.x; let dirY = player.y - ai.y; let l = Math.hypot(dirX, dirY);
                    ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
                } else { ai.state = 'wander'; }
            } else {
                if(Math.random()<0.02 || ai.state !== 'wander') { 
                    ai.state = 'wander'; let angle = Math.random() * Math.PI * 2; 
                    ai.vx = Math.cos(angle) * ai.speed * 0.5; ai.vy = Math.sin(angle) * ai.speed * 0.5; 
                }
            }
            
            if (Math.hypot(ai.vx, ai.vy) > 0) { ai.faceX = ai.vx; ai.faceY = ai.vy; }
            if (!isColliding(ai.x + ai.vx, ai.y, ai.radius)) ai.x += ai.vx; else ai.vx *= -1;
            if (!isColliding(ai.x, ai.y + ai.vy, ai.radius)) ai.y += ai.vy; else ai.vy *= -1;

            if (circleIntersect(player, ai)) {
                if (player.type > ai.type) { 
                    if(ai.id === nemesisId) { showKillText(player.x, player.y, "复仇成功！", "#e74c3c", true); nemesisId = null; } 
                    else { showKillText(player.x, player.y, KILL_MSGS[Math.floor(Math.random()*KILL_MSGS.length)], "#f1c40f", player.type>=4); }
                    
                    dropLoot(ai.x, ai.y, ai.type); 
                    aiList.splice(i, 1); setTimeout(()=> spawnAI(TYPE.CHICKEN), 5000); 
                } 
                else if (canBeEatenByAI) { 
                    gameActive = false; nemesisId = ai.id; 
                    dropLoot(player.x, player.y, player.type); 
                    document.getElementById('death-modal-overlay').style.display = 'flex';
                }
            }
        }

        // 飞行动画更新
        let targetX = camera.x + canvas.width / 2;
        let targetY = camera.y + 40; 
        
        for (let i = flyingExp.length - 1; i >= 0; i--) {
            let f = flyingExp[i];
            let dx = targetX - f.x; let dy = targetY - f.y; let dist = Math.hypot(dx, dy);
            
            if (dist < 40) {
                addProgress(f.val); flyingExp.splice(i, 1);
            } else {
                let flySpeed = Math.max(15, dist * 0.15); 
                f.x += (dx / dist) * flySpeed; f.y += (dy / dist) * flySpeed;
            }
        }

        let targetCamX = player.x - canvas.width / 2; let targetCamY = player.y - canvas.height / 2;
        camera.x += (targetCamX - camera.x) * 0.1; camera.y += (targetCamY - camera.y) * 0.1;
    }

    function addProgress(val) {
        if (player.type === 5 && !player.isTemp) return; 
        player.exp += val;
        let need1 = getNeedExp(1); let need2 = getNeedExp(2); let need3 = getNeedExp(3); let need4 = getNeedExp(4);
        
        if(player.exp >= need1 && player.type < TYPE.FOX) { player.exp -= need1; changePlayerType(TYPE.FOX, false); }
        else if(player.exp >= need2 && player.type < TYPE.WOLF) { player.exp -= need2; changePlayerType(TYPE.WOLF, false); }
        else if(player.exp >= need3 && player.type < TYPE.CROC) { player.exp -= need3; changePlayerType(TYPE.CROC, false); }
        else if(player.exp >= need4 && player.type < TYPE.DINO) { player.exp = 9999; changePlayerType(TYPE.DINO, false); }
        refreshProgressUI();
    }

    function refreshProgressUI() {
        if (player.type === 5 && !player.isTemp) {
            document.getElementById('progress-fill').style.width = "100%"; document.getElementById('progress-text').innerText = "MAX 王者";
        } else {
            let displayTier = player.isTemp ? 1 : player.type; 
            if(player.exp >= getNeedExp(1)) displayTier = 2;
            if(player.exp >= getNeedExp(1)+getNeedExp(2)) displayTier = 3;
            let need = getNeedExp(displayTier);
            
            let relativeExp = player.exp;
            if(displayTier > 1) relativeExp -= getNeedExp(1);
            if(displayTier > 2) relativeExp -= getNeedExp(2);
            if(displayTier > 3) relativeExp -= getNeedExp(3);

            let percent = Math.min(100, (Math.max(0, relativeExp) / need) * 100);
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('progress-text').innerText = `${Math.floor(Math.max(0, relativeExp))} / ${need}`;
        }
    }

    function updateUI(text, color) { 
        const txt = document.getElementById('status-text'); txt.innerText = text; 
        if(color) txt.style.color = color; 
    }

    // ★ 终极重绘：真正的小鸡与动物 ★
    function drawCharacter(ctx, x, y, type, fx, fy, isEnemy = false, isNemesis = false) {
        ctx.save(); ctx.translate(x, y); 
        // 面朝方向旋转 (以+y向下为脸的正前方)
        let angle = Math.atan2(fy, fx) - Math.PI/2; 
        ctx.rotate(angle);
        
        let r = getEntityProps(type).r;

        if (type === 1) { 
            // ★ 可爱黄色小鸡重绘 ★
            ctx.fillStyle = COLORS.CHICKEN; ctx.strokeStyle = "#d35400"; ctx.lineWidth = 3;
            // 扑腾的小翅膀
            let wingSwing = isEnemy ? 0 : Math.sin(Date.now() / 100) * 2; // 翅膀微微扇动
            ctx.beginPath(); ctx.ellipse(-r+2 - wingSwing, 0, r/4, r*0.8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(r-2 + wingSwing, 0, r/4, r*0.8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // 圆滚滚的身体
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // 橘色小尖嘴 (向下凸出)
            ctx.fillStyle = "#e67e22";
            ctx.beginPath(); ctx.moveTo(-6, r-3); ctx.lineTo(6, r-3); ctx.lineTo(0, r+6); ctx.fill(); ctx.stroke();
            // 黑豆眼
            ctx.fillStyle = "#2d3436";
            ctx.beginPath(); ctx.arc(-6, r-8, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, r-8, 2.5, 0, Math.PI*2); ctx.fill();
        } 
        else if (type === 2) { 
            // 狐狸
            ctx.fillStyle = COLORS.FOX; ctx.strokeStyle = COLORS.FOX_OUT; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(-15, -r+5); ctx.lineTo(-25, -r-15); ctx.lineTo(-5, -r-5); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(15, -r+5); ctx.lineTo(25, -r-15); ctx.lineTo(5, -r-5); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; 
            ctx.beginPath(); ctx.moveTo(-16, -r+2); ctx.lineTo(-22, -r-10); ctx.lineTo(-8, -r-3); ctx.fill();
            ctx.beginPath(); ctx.moveTo(16, -r+2); ctx.lineTo(22, -r-10); ctx.lineTo(8, -r-3); ctx.fill();
            ctx.fillStyle = COLORS.FOX; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(0, r, 6, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 2; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(-12, r-12); ctx.lineTo(-6, r-8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(12, r-12); ctx.lineTo(6, r-8); ctx.stroke();
        }
        else if (type === 3) { 
            // 灰狼
            ctx.fillStyle = COLORS.WOLF; ctx.strokeStyle = COLORS.WOLF_OUT; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(-12, -r+5); ctx.lineTo(-20, -r-10); ctx.lineTo(-5, -r); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(12, -r+5); ctx.lineTo(20, -r-10); ctx.lineTo(5, -r); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#a8b1bd"; 
            ctx.beginPath(); ctx.moveTo(-12, -r+2); ctx.lineTo(-17, -r-6); ctx.lineTo(-7, -r); ctx.fill();
            ctx.beginPath(); ctx.moveTo(12, -r+2); ctx.lineTo(17, -r-6); ctx.lineTo(7, -r); ctx.fill();
            ctx.fillStyle = COLORS.WOLF; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(0, r-2, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(-10, r-12); ctx.lineTo(-5, r-15); ctx.lineTo(-4, r-10); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10, r-12); ctx.lineTo(5, r-15); ctx.lineTo(4, r-10); ctx.fill();
        }
        else if (type === 4) { 
            // 巨鳄
            ctx.fillStyle = COLORS.CROC; ctx.strokeStyle = COLORS.CROC_OUT; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.ellipse(0, r/2, r*0.6, r*0.8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(0, -r/4, r*0.9, r*0.6, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = COLORS.CROC_OUT; 
            ctx.beginPath(); ctx.ellipse(-10, r, 4, 8, Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(10, r, 4, 8, -Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#c8d6a1"; ctx.beginPath(); ctx.arc(-15, -r/4, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(15, -r/4, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; 
            ctx.beginPath(); ctx.ellipse(-15, -r/4, 2, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(15, -r/4, 2, 4, 0, 0, Math.PI*2); ctx.fill();
        }
        else if (type === 5) { 
            // 三角龙
            ctx.fillStyle = COLORS.DINO; ctx.strokeStyle = COLORS.DINO_OUT; ctx.lineWidth = 4;
            ctx.beginPath();
            for(let i=0; i<=Math.PI; i+=Math.PI/6) {
                let radius = r + (i% (Math.PI/3) === 0 ? 0 : 8); 
                ctx.lineTo(-Math.cos(i)*radius, -Math.sin(i)*radius - r/4);
            }
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#c5cdad";
            for(let i=Math.PI/6; i<Math.PI; i+=Math.PI/3) {
                ctx.beginPath(); ctx.arc(-Math.cos(i)*r, -Math.sin(i)*r - r/4, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }
            ctx.fillStyle = COLORS.DINO; ctx.beginPath(); ctx.moveTo(0, r); ctx.lineTo(-r*0.7, -r*0.3); ctx.lineTo(r*0.7, -r*0.3); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#a8b195"; ctx.beginPath(); ctx.moveTo(0, r+5); ctx.lineTo(-8, r-5); ctx.lineTo(8, r-5); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#e0e6c8"; 
            ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(-25, r-5); ctx.lineTo(-5, 0); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10, -5); ctx.lineTo(25, r-5); ctx.lineTo(5, 0); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, r-15); ctx.lineTo(-4, r-25); ctx.lineTo(4, r-25); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(-15, 5, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(15, 5, 3, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        if (isNemesis) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = "#ff3838"; ctx.font = "bold 24px 'Segoe UI'"; ctx.textAlign = "center"; ctx.shadowColor = "white"; ctx.shadowBlur = 5;
            ctx.fillText("仇人", 0, - (r + 15 + Math.sin(Date.now()/200)*10));
            ctx.restore();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = "#d8e3d6"; ctx.fillRect(camera.x, camera.y, MAP_SIZE, MAP_SIZE); 
        
        ctx.strokeStyle = "rgba(100,100,100,0.1)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,MAP_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,1000); ctx.lineTo(MAP_SIZE,1000); ctx.stroke();

        for (let f of foods) { 
            ctx.fillStyle = f.val === 5 ? "#e67e22" : "#f1c40f"; 
            ctx.beginPath(); ctx.arc(f.x, f.y, f.val === 5 ? 8 : 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.arc(f.x, f.y, f.val === 5 ? 4 : 2, 0, Math.PI*2); ctx.fill();
        }

        // ★ 重绘魔法石板符文 ★
        for (let r of runes) {
            let color = getEntityProps(r.rType).color;
            ctx.save(); ctx.translate(r.x, r.y);
            
            // 上下浮动
            let floatY = Math.sin((Date.now() - r.createTime) / 200) * 5;
            ctx.translate(0, floatY);

            // 底部呼吸光环
            ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 150) * 0.2;
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;

            // 绘制六边形深色石板
            ctx.fillStyle = "#34495e"; ctx.strokeStyle = color; ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                let angle = (Math.PI / 3) * i + Math.PI / 6;
                ctx.lineTo(Math.cos(angle) * 22, Math.sin(angle) * 22);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke();

            // 石板上的 Emoji 图标
            ctx.fillStyle = "#fff"; ctx.font = "bold 22px 'Segoe UI'"; 
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.shadowColor = color; ctx.shadowBlur = 10;
            let emoji = r.rType===2 ? '🦊' : r.rType===3 ? '🐺' : r.rType===4 ? '🐊' : '🦖';
            ctx.fillText(emoji, 0, 2);
            ctx.restore();
        }

        for (let b of bushes) { 
            ctx.fillStyle = "rgba(170, 190, 160, 0.4)"; 
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(b.x-b.r/2, b.y+b.r/3, b.r*0.8, 0, Math.PI*2); ctx.fill();
        } 

        for (let ai of aiList) {
            drawCharacter(ctx, ai.x, ai.y, ai.type, ai.faceX, ai.faceY, true, ai.id === nemesisId);
        }

        for (let eff of player.flashEffects) { ctx.globalAlpha = eff.alpha * 0.3; drawCharacter(ctx, eff.x, eff.y, eff.type, eff.faceX, eff.faceY); }
        ctx.globalAlpha = 1.0;

        if(gameActive) {
            if (player.inBush) ctx.globalAlpha = 0.5;
            
            if(player.invincibleTimer > 0) {
                ctx.save(); ctx.translate(player.x, player.y);
                ctx.beginPath(); ctx.arc(0, 0, player.radius + 10 + Math.sin(Date.now()/100)*5, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 4; ctx.stroke(); 
                ctx.restore();
            }

            drawCharacter(ctx, player.x, player.y, player.type, player.faceX, player.faceY, false); ctx.globalAlpha = 1.0;
            
            if (player.isTemp) {
                let offset = player.invincibleTimer > 0 ? 45 : 20; 
                ctx.fillStyle = "#333"; ctx.font = "bold 20px 'Segoe UI'"; ctx.shadowColor = "white"; ctx.shadowBlur = 3;
                ctx.fillText(Math.ceil(player.tempTimer/60) + "s", player.x, player.y - player.radius - offset); ctx.shadowBlur = 0;
            }
        }

        for(let f of flyingExp) {
            ctx.fillStyle = f.val === 5 ? "#e67e22" : "#f1c40f";
            ctx.beginPath(); ctx.arc(f.x, f.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "rgba(241, 196, 15, 0.3)";
            ctx.beginPath(); ctx.arc(f.x, f.y, 12, 0, Math.PI*2); ctx.fill();
        }

        for(let ft of floatingTexts) {
            ctx.globalAlpha = ft.alpha; ctx.fillStyle = ft.color; ctx.font = ft.font; ctx.shadowColor = "rgba(255,255,255,0.8)"; ctx.shadowBlur = 3;
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

        ctx.restore();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    initEnvironment(); revivePlayer(); gameLoop(); 
</script>
</body>
</html>
