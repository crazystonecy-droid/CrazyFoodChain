<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>疯狂食物链 - 狼王觉醒版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #6da235;
            touch-action: none; overscroll-behavior: none;
            -webkit-user-select: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #top-bar {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 50%; transform: translateX(-50%);
            width: 80vw; max-width: 400px; text-align: center;
        }
        #status-text {
            color: #fff; font-weight: 900; font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 8px;
        }
        #progress-bg {
            width: 100%; height: 18px; background: rgba(0,0,0,0.6);
            border-radius: 9px; border: 2px solid #fff; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #f39c12); transition: width 0.3s ease; }

        #joystick-zone {
            position: absolute; bottom: max(30px, env(safe-area-inset-bottom, 30px)); 
            left: max(30px, env(safe-area-inset-left, 30px));
            width: 130px; height: 130px; background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); pointer-events: auto; backdrop-filter: blur(4px);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        #dash-btn {
            position: absolute; bottom: max(40px, env(safe-area-inset-bottom, 40px)); 
            right: max(40px, env(safe-area-inset-right, 40px));
            width: 80px; height: 80px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; display: flex; justify-content: center; align-items: center;
            font-size: 26px; color: white; font-weight: bold;
        }
        #dash-btn:active { transform: scale(0.95); }
        #dash-cd {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            border-radius: 50%; display: none; justify-content: center; align-items: center;
            font-size: 24px; color: #fff;
        }
        
        #death-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(200, 0, 0, 0.6); display: none;
            justify-content: center; align-items: center; flex-direction: column;
            pointer-events: auto; z-index: 999; backdrop-filter: blur(5px);
        }
        #death-screen h1 { color: white; font-size: 40px; text-shadow: 2px 2px 0 #000; }
        #restart-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: #f1c40f; border: none; border-radius: 30px;
            box-shadow: 0 5px 0 #d35400; color: #333;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="top-bar">
            <div id="status-text">你是小鸡 - 躲避野狐狸！寻找紫符文</div>
            <div id="progress-bg"><div id="progress-fill"></div></div>
        </div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="dash-btn">闪<div id="dash-cd"></div></div>
    </div>
    <div id="death-screen">
        <h1>成为别人的晚餐！</h1>
        <button id="restart-btn" onclick="resetGame()">重新开始</button>
    </div>

<script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 更新等级：鸡 -> 临时狐狸 -> 狼
    const TYPE = { CHICKEN: 0, TEMP_FOX: 1, WOLF: 2 };
    // 击杀随机飙字库
    const KILL_MSGS = ["弱肉强食!", "大吉大利!", "致命一击!", "美味!", "无情碾压!", "+1"];

    let camera = { x: 0, y: 0 };
    let player = {};
    let bushes = [], crates = [], stones = [], foods = [], runes = [], aiChickens = [], aiFoxes = [];
    let floatingTexts = []; // 击杀爆字特效数组
    let gameActive = true;

    function resetGame() {
        document.getElementById('death-screen').style.display = 'none';
        
        player = {
            x: 1500, y: 1500, radius: 18, speed: 4.5, type: TYPE.CHICKEN,
            faceX: 1, faceY: 0, // 默认面朝右边
            dashCooldown: 0, dashMaxCd: 180, flashEffects: [],
            tempFoxTimer: 0, tempFoxMaxTime: 20 * 60,
            evolutionProgress: 0, maxProgress: 100, inBush: false
        };

        bushes = []; crates = []; stones = []; foods = []; runes = []; aiChickens = []; aiFoxes = []; floatingTexts = [];
        
        for(let i=0; i<30; i++) bushes.push({ x: Math.random()*3000, y: Math.random()*3000, w: 150+Math.random()*150, h: 150+Math.random()*150 });
        for(let i=0; i<25; i++) crates.push({ x: Math.random()*3000, y: Math.random()*3000, w: 80+Math.random()*40, h: 80+Math.random()*40 });
        for(let i=0; i<25; i++) stones.push({ x: Math.random()*3000, y: Math.random()*3000, radius: 40+Math.random()*30 });
        for(let i=0; i<100; i++) foods.push({ x: Math.random()*3000, y: Math.random()*3000 });
        for(let i=0; i<8; i++) runes.push({ x: Math.random()*3000, y: Math.random()*3000 });
        
        for(let i=0; i<35; i++) aiChickens.push({ x: Math.random()*3000, y: Math.random()*3000, vx: 0, vy: 0, faceX: 1, faceY: 0, speed: 3.5, radius: 15, state: 'wander' });
        for(let i=0; i<8; i++) aiFoxes.push({ x: Math.random()*3000, y: Math.random()*3000, vx: 0, vy: 0, faceX: 1, faceY: 0, speed: 4, radius: 22, state: 'wander' });

        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;
        gameActive = true;
        updateUI("你是小鸡 - 躲避野狐狸！寻找紫符文", "#fff");
        document.getElementById('progress-fill').style.width = "0%";
    }

    function isColliding(x, y, r) {
        if(x - r < 0 || x + r > 3000 || y - r < 0 || y + r > 3000) return true;
        for (let c of crates) {
            let testX = x, testY = y;
            if (x < c.x) testX = c.x; else if (x > c.x + c.w) testX = c.x + c.w;
            if (y < c.y) testY = c.y; else if (y > c.y + c.h) testY = c.y + c.h;
            if (Math.hypot(x - testX, y - testY) < r) return true;
        }
        for (let s of stones) { if (Math.hypot(x - s.x, y - s.y) < r + s.radius) return true; }
        return false;
    }

    function circleIntersect(c1, c2) { return Math.hypot(c1.x - c2.x, c1.y - c2.y) < (c1.radius + (c2.radius || 10)); }

    // 控制与突击
    let joyActive = false; let joyVector = { x: 0, y: 0 };
    const joyZone = document.getElementById('joystick-zone'); const joyKnob = document.getElementById('joystick-knob');

    function handleJoy(e) {
        if(e) e.preventDefault();
        if(e.type === 'touchend' || e.type === 'mouseup') {
            joyActive = false; joyVector = {x: 0, y: 0}; joyKnob.style.transform = `translate(-50%, -50%)`; return;
        }
        joyActive = true;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let rect = joyZone.getBoundingClientRect();
        let dx = clientX - (rect.left + rect.width/2); let dy = clientY - (rect.top + rect.height/2);
        let dist = Math.hypot(dx, dy); let maxDist = 50;
        if (dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; }
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joyVector.x = dx / maxDist; joyVector.y = dy / maxDist;
    }
    joyZone.addEventListener('touchstart', handleJoy); joyZone.addEventListener('touchmove', handleJoy); joyZone.addEventListener('touchend', handleJoy);

    // 闪现：静止时也会按照 faceX 和 faceY 突击
    const dashCdUI = document.getElementById('dash-cd');
    document.getElementById('dash-btn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if(player.dashCooldown <= 0 && gameActive) {
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, alpha: 1.0 });
            
            let flashDist = 220; let step = 10;
            let finalX = player.x; let finalY = player.y;
            for(let i=0; i<flashDist; i+=step) {
                let testX = finalX + player.faceX * step; let testY = finalY + player.faceY * step;
                if(isColliding(testX, testY, player.radius)) break;
                finalX = testX; finalY = testY;
            }
            player.x = finalX; player.y = finalY;
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, alpha: 0.8 });
            player.dashCooldown = player.dashMaxCd; dashCdUI.style.display = 'flex';
        }
    });

    // 增加击杀爆字
    function showKillText(x, y, isBig = false) {
        let text = KILL_MSGS[Math.floor(Math.random() * KILL_MSGS.length)];
        let color = isBig ? "#ff3838" : "#ff9f1a";
        let size = isBig ? "30px" : "22px";
        floatingTexts.push({ x: x, y: y - 20, text: text, alpha: 1.0, color: color, font: `900 ${size} Arial` });
    }

    function update() {
        if(!gameActive) return;

        let moveX = joyActive ? joyVector.x : 0; let moveY = joyActive ? joyVector.y : 0;
        let len = Math.hypot(moveX, moveY);
        if (len > 0) {
            moveX /= len; moveY /= len;
            // 更新最后面朝方向
            player.faceX = moveX; player.faceY = moveY;
        }

        if (!isColliding(player.x + moveX * player.speed, player.y, player.radius)) player.x += moveX * player.speed;
        if (!isColliding(player.x, player.y + moveY * player.speed, player.radius)) player.y += moveY * player.speed;

        if (player.dashCooldown > 0) {
            player.dashCooldown--; dashCdUI.innerText = Math.ceil(player.dashCooldown / 60);
            if(player.dashCooldown <= 0) dashCdUI.style.display = 'none';
        }

        // 爆字动画更新
        for(let i = floatingTexts.length-1; i>=0; i--) {
            floatingTexts[i].y -= 1.5; // 向上飘
            floatingTexts[i].alpha -= 0.015; // 渐隐
            if(floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1);
        }

        for (let i = player.flashEffects.length - 1; i >= 0; i--) {
            player.flashEffects[i].alpha -= 0.06;
            if (player.flashEffects[i].alpha <= 0) player.flashEffects.splice(i, 1);
        }

        player.inBush = false;
        for (let b of bushes) {
            if (player.x>b.x && player.x<b.x+b.w && player.y>b.y && player.y<b.y+b.h) { player.inBush = true; break; }
        }

        if (player.type === TYPE.TEMP_FOX) {
            player.tempFoxTimer--;
            if (player.tempFoxTimer <= 0) {
                player.type = TYPE.CHICKEN; player.evolutionProgress = 0;
                updateUI("时间到！变回小鸡，快跑", "#fff"); document.getElementById('progress-fill').style.width = "0%";
            }
        }

        for (let i = foods.length - 1; i >= 0; i--) {
            if (circleIntersect(player, {x: foods[i].x, y: foods[i].y, radius: 5})) {
                foods.splice(i, 1); foods.push({ x: Math.random()*3000, y: Math.random()*3000 });
                if (player.type === TYPE.CHICKEN) addProgress(5);
            }
        }

        for (let i = runes.length - 1; i >= 0; i--) {
            if (player.type === TYPE.CHICKEN && circleIntersect(player, {x: runes[i].x, y: runes[i].y, radius: 15})) {
                runes.splice(i, 1);
                player.type = TYPE.TEMP_FOX; player.tempFoxTimer = player.tempFoxMaxTime; player.evolutionProgress = 0;
                updateUI("【狐狸体验卡】快去吃鸡进化！", "#ff4757");
                setTimeout(()=> runes.push({ x: Math.random()*3000, y: Math.random()*3000 }), 10000);
            }
        }

        // --- AI 逻辑 ---
        for (let i = aiChickens.length - 1; i >= 0; i--) {
            let ai = aiChickens[i];
            let distToPlayer = Math.hypot(player.x - ai.x, player.y - ai.y);
            
            if ((player.type === TYPE.TEMP_FOX || player.type === TYPE.WOLF) && distToPlayer < 350 && !player.inBush) {
                ai.state = 'flee';
                let dirX = ai.x - player.x; let dirY = ai.y - player.y; let l = Math.hypot(dirX, dirY);
                ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
            } else {
                if(Math.random()<0.02 || ai.state === 'flee') {
                    ai.state = 'wander'; let angle = Math.random() * Math.PI * 2;
                    ai.vx = Math.cos(angle) * ai.speed * 0.5; ai.vy = Math.sin(angle) * ai.speed * 0.5;
                }
            }
            // 更新AI面朝方向
            if (Math.hypot(ai.vx, ai.vy) > 0) { ai.faceX = ai.vx; ai.faceY = ai.vy; }

            if (!isColliding(ai.x + ai.vx, ai.y, ai.radius)) ai.x += ai.vx; else ai.vx *= -1;
            if (!isColliding(ai.x, ai.y + ai.vy, ai.radius)) ai.y += ai.vy; else ai.vy *= -1;

            // 被吃
            if ((player.type === TYPE.TEMP_FOX || player.type === TYPE.WOLF) && circleIntersect(player, ai)) {
                aiChickens.splice(i, 1); aiChickens.push({ x: Math.random()*3000, y: Math.random()*3000, vx:0, vy:0, faceX:1, faceY:0, speed: 3.5, radius: 15, state: 'wander' });
                showKillText(player.x, player.y, false); // 飙字
                if (player.type === TYPE.TEMP_FOX) addProgress(34);
            }
        }

        for (let i = aiFoxes.length - 1; i >= 0; i--) {
            let ai = aiFoxes[i];
            let distToPlayer = Math.hypot(player.x - ai.x, player.y - ai.y);
            
            if (player.type === TYPE.CHICKEN && distToPlayer < 400 && !player.inBush) {
                // 追杀鸡
                ai.state = 'chase';
                let dirX = player.x - ai.x; let dirY = player.y - ai.y; let l = Math.hypot(dirX, dirY);
                ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
            } else if (player.type === TYPE.WOLF && distToPlayer < 400 && !player.inBush) {
                // 怕狼，逃跑
                ai.state = 'flee';
                let dirX = ai.x - player.x; let dirY = ai.y - player.y; let l = Math.hypot(dirX, dirY);
                ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
            } else {
                if(Math.random()<0.02 || ai.state === 'chase' || ai.state === 'flee') {
                    ai.state = 'wander'; let angle = Math.random() * Math.PI * 2;
                    ai.vx = Math.cos(angle) * ai.speed * 0.5; ai.vy = Math.sin(angle) * ai.speed * 0.5;
                }
            }
            
            if (Math.hypot(ai.vx, ai.vy) > 0) { ai.faceX = ai.vx; ai.faceY = ai.vy; }
            if (!isColliding(ai.x + ai.vx, ai.y, ai.radius)) ai.x += ai.vx; else ai.vx *= -1;
            if (!isColliding(ai.x, ai.y + ai.vy, ai.radius)) ai.y += ai.vy; else ai.vy *= -1;

            // 鸡被狐狸吃
            if (player.type === TYPE.CHICKEN && circleIntersect(player, ai)) {
                gameActive = false; document.getElementById('death-screen').style.display = 'flex';
            }
            // 狼吃狐狸
            if (player.type === TYPE.WOLF && circleIntersect(player, ai)) {
                aiFoxes.splice(i, 1); aiFoxes.push({ x: Math.random()*3000, y: Math.random()*3000, vx:0, vy:0, faceX:1, faceY:0, speed: 4, radius: 22, state: 'wander' });
                showKillText(player.x, player.y, true); // 大字击杀
            }
        }

        let targetCamX = player.x - canvas.width / 2; let targetCamY = player.y - canvas.height / 2;
        camera.x += (targetCamX - camera.x) * 0.1; camera.y += (targetCamY - camera.y) * 0.1;
    }

    function addProgress(val) {
        player.evolutionProgress += val;
        if (player.evolutionProgress >= player.maxProgress) {
            player.evolutionProgress = 0;
            if (player.type === TYPE.CHICKEN) updateUI("满级小鸡！寻找紫符文", "#2ed573");
            else if (player.type === TYPE.TEMP_FOX) {
                player.type = TYPE.WOLF; player.radius = 26; player.speed = 5; // 变狼，体型变大变快
                updateUI("狼王降临！狩猎所有动物！", "#fffa65");
            }
        }
        document.getElementById('progress-fill').style.width = Math.min(100, player.evolutionProgress) + "%";
    }

    function updateUI(text, color) {
        const txt = document.getElementById('status-text'); txt.innerText = text; txt.style.color = color;
    }

    // --- 重点：通过旋转画布实现身体朝向 ---
    function drawCharacter(ctx, x, y, type, fx, fy, isEnemy = false) {
        ctx.save();
        ctx.translate(x, y);
        // 计算旋转角度 (Math.atan2 根据方向向量算弧度)
        let angle = Math.atan2(fy, fx);
        ctx.rotate(angle);
        
        // 接下来所有的绘制都以圆心为基准，默认面朝右边画 (x的正方向)
        if (type === TYPE.CHICKEN) {
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#a4b0be"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // 嘴巴 (朝右)
            ctx.fillStyle = "#ffa502"; ctx.beginPath(); ctx.moveTo(14, -5); ctx.lineTo(24, 0); ctx.lineTo(14, 5); ctx.fill();
            // 鸡冠 (朝上/左)
            ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(-2, -10, 5, 0, Math.PI*2); ctx.fill();
            // 眼睛
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(6, -6, 2, 0, Math.PI*2); ctx.fill();
        } 
        else if (type === TYPE.TEMP_FOX || (isEnemy && type === 'FOX')) {
            ctx.fillStyle = isEnemy ? "#ff4757" : "#ff7f50";
            ctx.strokeStyle = "#d35400"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // 狐狸鼻子 (朝右突出)
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(22, 0, 5, 0, Math.PI*2); ctx.fill();
            // 耳朵 (靠左边)
            ctx.beginPath(); ctx.moveTo(5, -15); ctx.lineTo(-10, -28); ctx.lineTo(-12, -10); ctx.fill();
            ctx.beginPath(); ctx.moveTo(5, 15);  ctx.lineTo(-10, 28);  ctx.lineTo(-12, 10);  ctx.fill();
        }
        else if (type === TYPE.WOLF) {
            // 黑色的狼王
            ctx.fillStyle = "#2f3542"; ctx.strokeStyle = "#1e272e"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            // 狼嘴吻部
            ctx.fillStyle = "#57606f"; ctx.beginPath(); ctx.arc(22, 0, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(28, 0, 4, 0, Math.PI*2); ctx.fill();
            // 狼耳 (尖锐)
            ctx.beginPath(); ctx.moveTo(5, -18); ctx.lineTo(-12, -35); ctx.lineTo(-15, -12); ctx.fill();
            ctx.beginPath(); ctx.moveTo(5, 18);  ctx.lineTo(-12, 35);  ctx.lineTo(-15, 12);  ctx.fill();
            // 狼眼 (发黄光)
            ctx.fillStyle = "#f1c40f"; 
            ctx.beginPath(); ctx.arc(10, -8, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, 8, 3, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = "#7bed9f"; ctx.fillRect(camera.x, camera.y, canvas.width, canvas.height);
        
        ctx.fillStyle = "#2ed573"; for (let f of foods) { ctx.beginPath(); ctx.arc(f.x, f.y, 5, 0, Math.PI*2); ctx.fill(); }

        for (let r of runes) {
            ctx.fillStyle = "#9c88ff"; ctx.beginPath(); ctx.arc(r.x, r.y, 14, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#c8d6e5"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(r.x, r.y, 18 + Math.sin(Date.now()/150)*4, 0, Math.PI*2); ctx.stroke();
        }

        ctx.fillStyle = "#747d8c"; ctx.strokeStyle = "#57606f"; ctx.lineWidth = 3;
        for (let s of stones) {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#a4b0be"; ctx.beginPath(); ctx.arc(s.x-s.radius*0.3, s.y-s.radius*0.3, s.radius*0.3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#747d8c";
        }

        ctx.fillStyle = "#d1ccc0"; ctx.strokeStyle = "#84817a"; ctx.lineWidth = 4;
        for (let c of crates) { 
            ctx.fillRect(c.x, c.y, c.w, c.h); ctx.strokeRect(c.x, c.y, c.w, c.h); 
            ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x+c.w, c.y+c.h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(c.x+c.w, c.y); ctx.lineTo(c.x, c.y+c.h); ctx.stroke();
        }

        // 绘制AI
        for (let ai of aiChickens) {
            drawCharacter(ctx, ai.x, ai.y, TYPE.CHICKEN, ai.faceX, ai.faceY);
            if(ai.state === 'flee') { ctx.fillStyle = "#70a1ff"; ctx.beginPath(); ctx.arc(ai.x, ai.y-22, 4, 0, Math.PI*2); ctx.fill(); }
        }
        for (let ai of aiFoxes) {
            drawCharacter(ctx, ai.x, ai.y, TYPE.TEMP_FOX, ai.faceX, ai.faceY, true);
            if(ai.state === 'chase') { ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(ai.x, ai.y-25, 5, 0, Math.PI*2); ctx.fill(); }
            if(ai.state === 'flee')  { ctx.fillStyle = "#70a1ff"; ctx.beginPath(); ctx.arc(ai.x, ai.y-25, 4, 0, Math.PI*2); ctx.fill(); }
        }

        // 玩家残影
        for (let eff of player.flashEffects) {
            ctx.globalAlpha = eff.alpha * 0.4; 
            drawCharacter(ctx, eff.x, eff.y, player.type, eff.faceX, eff.faceY);
        }
        ctx.globalAlpha = 1.0;

        // 绘制玩家
        if(gameActive) {
            if (player.inBush) ctx.globalAlpha = 0.5;
            drawCharacter(ctx, player.x, player.y, player.type, player.faceX, player.faceY);
            ctx.globalAlpha = 1.0;

            if (player.type === TYPE.TEMP_FOX) {
                let s = Math.ceil(player.tempFoxTimer / 60);
                ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial"; ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
                ctx.fillText(s + "s", player.x - 12, player.y - 35); ctx.shadowBlur = 0;
            }
        }

        // 草丛
        ctx.globalAlpha = 0.85; ctx.fillStyle = "#2ed573"; ctx.strokeStyle = "#2f3542"; ctx.lineWidth = 3;
        for (let b of bushes) {
            ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
        }
        ctx.globalAlpha = 1.0;

        // 绘制击杀飙字特效 (盖在最上面)
        for(let ft of floatingTexts) {
            ctx.globalAlpha = ft.alpha;
            ctx.fillStyle = ft.color;
            ctx.font = ft.font;
            ctx.shadowColor = "rgba(0,0,0,0.8)"; 
            ctx.shadowBlur = 5;
            ctx.fillText(ft.text, ft.x - 30, ft.y);
        }
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

        ctx.restore();
    }

    function gameLoop() {
        update(); draw();
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
</script>
</body>
</html>
