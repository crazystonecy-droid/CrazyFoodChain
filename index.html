<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>疯狂食物链 - 极致手感 V8</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #6da235;
            touch-action: none; overscroll-behavior: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #top-bar {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 50%; transform: translateX(-50%);
            width: 90vw; max-width: 400px; text-align: center;
        }
        #status-text {
            color: #fff; font-weight: 900; font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 8px;
        }
        #progress-bg {
            width: 100%; height: 22px; background: rgba(0,0,0,0.6);
            border-radius: 11px; border: 2px solid #fff; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
        }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #e67e22); transition: width 0.3s ease; }
        #progress-text {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        #joystick-zone {
            position: absolute; bottom: max(40px, env(safe-area-inset-bottom, 40px)); 
            left: max(30px, env(safe-area-inset-left, 30px));
            width: 130px; height: 130px; background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); pointer-events: auto; backdrop-filter: blur(4px);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.9); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        #dash-btn {
            position: absolute; bottom: max(60px, env(safe-area-inset-bottom, 60px)); 
            right: max(30px, env(safe-area-inset-right, 30px));
            width: 80px; height: 80px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 50%; border: 3px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; display: flex; justify-content: center; align-items: center;
            font-size: 26px; color: white; font-weight: bold;
        }
        #dash-btn:active { transform: scale(0.95); }
        #dash-cd {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            border-radius: 50%; display: none; justify-content: center; align-items: center;
            font-size: 24px; color: #fff;
        }
        
        #death-modal-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0, 0, 0, 0.65); display: none;
            justify-content: center; align-items: center;
            pointer-events: auto; z-index: 999; backdrop-filter: blur(5px);
        }
        .modal-box {
            background: linear-gradient(180deg, #fff 0%, #f1f2f6 100%);
            width: 80vw; max-width: 350px; border-radius: 20px; padding: 30px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid #34495e;
        }
        .modal-title { color: #e74c3c; font-size: 32px; font-weight: 900; margin-top: 0; margin-bottom: 10px; }
        .modal-desc { color: #7f8c8d; font-size: 16px; margin-bottom: 30px; font-weight: bold; }
        .btn {
            display: block; width: 100%; padding: 16px 0; margin-bottom: 15px;
            font-size: 20px; font-weight: 900; border: none; border-radius: 30px;
            box-sizing: border-box; cursor: pointer;
        }
        .btn-revive { background: linear-gradient(180deg, #2ecc71, #27ae60); color: white; border: 2px solid #219a52; }
        .btn-leave { background: linear-gradient(180deg, #f1c40f, #e67e22); color: white; border: 2px solid #d35400; margin-bottom: 0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="top-bar">
            <div id="status-text">你是小鸡 - 寻找符文进化！</div>
            <div id="progress-bg"><div id="progress-fill"></div><div id="progress-text">0 / 100</div></div>
        </div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="dash-btn">闪<div id="dash-cd"></div></div>
    </div>
    <div id="death-modal-overlay">
        <div class="modal-box">
            <h1 class="modal-title">你被吃掉了！</h1>
            <p class="modal-desc">不要放弃，找它复仇！</p>
            <button class="btn btn-revive" onclick="revivePlayer()">▶ 立即复活</button>
            <button class="btn btn-leave" onclick="fullResetGame()">离开房间 (重开)</button>
        </div>
    </div>

<script>
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 食物链阶层定义 (统一了速度，去掉了多余临时形态)
    const TYPE = { CHICKEN: 1, FOX: 2, WOLF: 3, CROC: 4, DINO: 5 };
    const GLOBAL_SPEED = 4.5; // ★核心修复：所有动物统一移速★
    
    const KILL_MSGS = ["弱肉强食!", "大吉大利!", "绝对碾压!", "一口吞!"];
    const MAP_SIZE = 4000;

    let camera = { x: 0, y: 0 }; let player = {};
    let bushes = [], crates = [], stones = [], foods = [], runes = [], aiList = [];
    let floatingTexts = []; let gameActive = true;
    let aiIdCounter = 1; let nemesisId = null; 

    function getSafeSpawn(radius) {
        let x, y, safe = false, attempts = 0;
        while (!safe && attempts < 150) {
            x = 200 + Math.random() * (MAP_SIZE - 400); y = 200 + Math.random() * (MAP_SIZE - 400);
            safe = !isColliding(x, y, radius); attempts++;
        }
        return { x: x, y: y };
    }

    function isColliding(x, y, r) {
        if(x - r < 0 || x + r > MAP_SIZE || y - r < 0 || y + r > MAP_SIZE) return true;
        for (let c of crates) {
            let testX = x, testY = y;
            if (x < c.x) testX = c.x; else if (x > c.x + c.w) testX = c.x + c.w;
            if (y < c.y) testY = c.y; else if (y > c.y + c.h) testY = c.y + c.h;
            if (Math.hypot(x - testX, y - testY) < r) return true;
        }
        for (let s of stones) { if (Math.hypot(x - s.x, y - s.y) < r + s.radius) return true; }
        return false;
    }
    function circleIntersect(c1, c2) { return Math.hypot(c1.x - c2.x, c1.y - c2.y) < (c1.radius + (c2.radius || 10)); }

    function spawnAI(type) {
        let props = getEntityProps(type); let pos = getSafeSpawn(props.r);
        aiList.push({
            id: aiIdCounter++, type: type, x: pos.x, y: pos.y, 
            vx: 0, vy: 0, faceX: 1, faceY: 0, speed: GLOBAL_SPEED, radius: props.r, state: 'wander'
        });
    }

    function spawnRune(typeVal) {
        let pos = getSafeSpawn(20);
        let emoji = typeVal===TYPE.FOX?'🦊':typeVal===TYPE.WOLF?'🐺':typeVal===TYPE.CROC?'🐊':'🦖';
        runes.push({ x: pos.x, y: pos.y, rType: typeVal, emoji: emoji });
    }

    function initEnvironment() {
        bushes = []; crates = []; stones = []; foods = []; runes = []; aiList = []; nemesisId = null;
        
        // 生成具象化草丛 (圆形簇)
        for(let i=0; i<40; i++) bushes.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, r: 80+Math.random()*60 });
        for(let i=0; i<35; i++) crates.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, w: 70+Math.random()*30, h: 70+Math.random()*30 });
        for(let i=0; i<35; i++) stones.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE, radius: 30+Math.random()*30 });
        for(let i=0; i<150; i++) foods.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE });
        
        for(let i=0; i<6; i++) spawnRune(TYPE.FOX);
        for(let i=0; i<3; i++) spawnRune(TYPE.WOLF);
        for(let i=0; i<2; i++) spawnRune(TYPE.CROC);
        for(let i=0; i<1; i++) spawnRune(TYPE.DINO);

        for(let i=0; i<40; i++) spawnAI(TYPE.CHICKEN);
        for(let i=0; i<10; i++) spawnAI(TYPE.FOX);
        for(let i=0; i<4; i++) spawnAI(TYPE.WOLF);
        for(let i=0; i<2; i++) spawnAI(TYPE.CROC);
        for(let i=0; i<1; i++) spawnAI(TYPE.DINO); 
    }

    function getNeedExp(tier) {
        if(tier === 1) return 100; if(tier === 2) return 300;
        if(tier === 3) return 800; if(tier === 4) return 1500;
        return 9999;
    }

    function getEntityProps(type) {
        if(type === 1) return { r: 16, name: "小白鸡", color: "#fff" };
        if(type === 2) return { r: 22, name: "赤狐", color: "#ff4757" };
        if(type === 3) return { r: 28, name: "黑狼王", color: "#e15f41" };
        if(type === 4) return { r: 40, name: "史前巨鳄", color: "#1abc9c" };
        if(type === 5) return { r: 60, name: "霸王龙", color: "#d35400" };
        return { r: 16 };
    }

    function fullResetGame() {
        document.getElementById('death-modal-overlay').style.display = 'none'; initEnvironment();
        let startPos = getSafeSpawn(16);
        player = {
            x: startPos.x, y: startPos.y, radius: 16, speed: GLOBAL_SPEED, type: TYPE.CHICKEN,
            faceX: 1, faceY: 0, dashCooldown: 0, dashMaxCd: 180, flashEffects: [],
            tempTimer: 0, tempMaxTime: 20 * 60, exp: 0, inBush: false, isTemp: false // 20秒体验卡
        };
        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;
        gameActive = true; updateUI("寻找发光符文进化！", "#fff"); refreshProgressUI();
    }

    function revivePlayer() {
        document.getElementById('death-modal-overlay').style.display = 'none';
        let safePos = getSafeSpawn(player.radius);
        player.x = safePos.x; player.y = safePos.y; player.exp = Math.max(0, player.exp - 50); player.dashCooldown = 0;
        camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;
        gameActive = true; refreshProgressUI();
    }

    let joyActive = false; let joyVector = { x: 0, y: 0 };
    const joyZone = document.getElementById('joystick-zone'); const joyKnob = document.getElementById('joystick-knob');
    function handleJoy(e) {
        if(e) e.preventDefault();
        if(e.type === 'touchend' || e.type === 'mouseup') { joyActive = false; joyVector = {x: 0, y: 0}; joyKnob.style.transform = `translate(-50%, -50%)`; return; }
        joyActive = true;
        let cx = e.touches ? e.touches[0].clientX : e.clientX; let cy = e.touches ? e.touches[0].clientY : e.clientY;
        let r = joyZone.getBoundingClientRect(); let dx = cx - (r.left + r.width/2); let dy = cy - (r.top + r.height/2);
        let dist = Math.hypot(dx, dy); if (dist > 50) { dx = (dx/dist)*50; dy = (dy/dist)*50; }
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joyVector.x = dx / 50; joyVector.y = dy / 50;
    }
    joyZone.addEventListener('touchstart', handleJoy); joyZone.addEventListener('touchmove', handleJoy); joyZone.addEventListener('touchend', handleJoy);

    const dashCdUI = document.getElementById('dash-cd');
    document.getElementById('dash-btn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        if(player.dashCooldown <= 0 && gameActive) {
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, type: player.type, alpha: 1.0 });
            let flashDist = player.radius * 6; // 闪现距离和体型挂钩
            let finalX = player.x; let finalY = player.y;
            for(let i=0; i<flashDist; i+=10) {
                let tx = finalX + player.faceX * 10; let ty = finalY + player.faceY * 10;
                if(isColliding(tx, ty, player.radius)) break;
                finalX = tx; finalY = ty;
            }
            player.x = finalX; player.y = finalY;
            player.flashEffects.push({ x: player.x, y: player.y, faceX: player.faceX, faceY: player.faceY, type: player.type, alpha: 0.8 });
            player.dashCooldown = player.dashMaxCd; dashCdUI.style.display = 'flex';
        }
    });

    function showKillText(x, y, text, color, isBig = false) {
        floatingTexts.push({ x: x, y: y - 30, text: text, alpha: 1.0, color: color, font: `900 ${isBig ? "36px" : "22px"} Arial` });
    }

    function changePlayerType(newType, isTemp) {
        player.type = newType; player.isTemp = isTemp;
        let props = getEntityProps(newType);
        player.radius = props.r;
        
        if(isTemp) {
            player.tempTimer = player.tempMaxTime;
            updateUI(`化身 ${props.name}！快去吞噬！`, props.color);
        } else {
            updateUI(`进化！真正的 ${props.name}！`, props.color);
        }
        refreshProgressUI();
    }

    function update() {
        if(!gameActive) return;

        let moveX = joyActive ? joyVector.x : 0; let moveY = joyActive ? joyVector.y : 0;
        let len = Math.hypot(moveX, moveY);
        if (len > 0) { moveX /= len; moveY /= len; player.faceX = moveX; player.faceY = moveY; }

        if (!isColliding(player.x + moveX * player.speed, player.y, player.radius)) player.x += moveX * player.speed;
        if (!isColliding(player.x, player.y + moveY * player.speed, player.radius)) player.y += moveY * player.speed;

        if (player.dashCooldown > 0) {
            player.dashCooldown--; dashCdUI.innerText = Math.ceil(player.dashCooldown / 60);
            if(player.dashCooldown <= 0) dashCdUI.style.display = 'none';
        }

        for(let i = floatingTexts.length-1; i>=0; i--) { floatingTexts[i].y -= 1.5; floatingTexts[i].alpha -= 0.015; if(floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1); }
        for (let i = player.flashEffects.length - 1; i >= 0; i--) { player.flashEffects[i].alpha -= 0.06; if (player.flashEffects[i].alpha <= 0) player.flashEffects.splice(i, 1); }

        player.inBush = false;
        // 圆形草丛判定 (点到圆心距离)
        for (let b of bushes) { if (Math.hypot(player.x - b.x, player.y - b.y) < b.r) { player.inBush = true; break; } }

        // 体验卡到期 (退回上一个永久形态)
        if (player.isTemp) {
            player.tempTimer--;
            if (player.tempTimer <= 0) {
                let fallbackType = TYPE.CHICKEN; let tempExp = player.exp;
                if(tempExp >= getNeedExp(1)) { fallbackType = TYPE.FOX; tempExp -= getNeedExp(1); }
                if(tempExp >= getNeedExp(2)) { fallbackType = TYPE.WOLF; tempExp -= getNeedExp(2); }
                if(tempExp >= getNeedExp(3)) { fallbackType = TYPE.CROC; }
                changePlayerType(fallbackType, false);
                updateUI("体验结束，保留进度！", "#fff");
            }
        }

        for (let i = foods.length - 1; i >= 0; i--) {
            if (circleIntersect(player, {x: foods[i].x, y: foods[i].y, radius: 5})) {
                foods.splice(i, 1); foods.push({ x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE });
                addProgress(5); 
            }
        }

        for (let i = runes.length - 1; i >= 0; i--) {
            if (circleIntersect(player, {x: runes[i].x, y: runes[i].y, radius: 20})) {
                let rt = runes[i].rType;
                if (rt >= player.type) { // 只要符文不比当前低级就能吃
                    changePlayerType(rt, true);
                    runes.splice(i, 1);
                    setTimeout(()=> spawnRune(rt), rt===TYPE.DINO?30000:15000);
                }
            }
        }

        // AI 核心逻辑 (修复猎物瞬间跑没影的问题)
        for (let i = aiList.length - 1; i >= 0; i--) {
            let ai = aiList[i]; 
            let distToPlayer = Math.hypot(player.x - ai.x, player.y - ai.y);
            
            // ★核心修复：距离近才逃跑，且速度和追击者一样★
            if (distToPlayer < (player.radius + ai.radius + 200) && !player.inBush) {
                if (player.type > ai.type) {
                    ai.state = 'flee'; let dirX = ai.x - player.x; let dirY = ai.y - player.y; let l = Math.hypot(dirX, dirY);
                    ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
                } else if (player.type < ai.type) {
                    ai.state = 'chase'; let dirX = player.x - ai.x; let dirY = player.y - ai.y; let l = Math.hypot(dirX, dirY);
                    ai.vx = (dirX / l) * ai.speed; ai.vy = (dirY / l) * ai.speed;
                }
            } else {
                if(Math.random()<0.02 || ai.state !== 'wander') { 
                    ai.state = 'wander'; let angle = Math.random() * Math.PI * 2; 
                    ai.vx = Math.cos(angle) * ai.speed * 0.5; ai.vy = Math.sin(angle) * ai.speed * 0.5; 
                }
            }
            
            if (Math.hypot(ai.vx, ai.vy) > 0) { ai.faceX = ai.vx; ai.faceY = ai.vy; }
            if (!isColliding(ai.x + ai.vx, ai.y, ai.radius)) ai.x += ai.vx; else ai.vx *= -1;
            if (!isColliding(ai.x, ai.y + ai.vy, ai.radius)) ai.y += ai.vy; else ai.vy *= -1;

            if (circleIntersect(player, ai)) {
                if (player.type > ai.type) {
                    if(ai.id === nemesisId) {
                        showKillText(player.x, player.y, "🔥 复仇成功！", "#ff3838", true); nemesisId = null;
                    } else {
                        showKillText(player.x, player.y, KILL_MSGS[Math.floor(Math.random()*KILL_MSGS.length)], "#f1c40f", player.type>=4);
                    }
                    addProgress(ai.type * 40);
                    let respawnType = ai.type; aiList.splice(i, 1); setTimeout(()=> spawnAI(respawnType), 5000);
                } 
                else if (player.type < ai.type) {
                    gameActive = false; nemesisId = ai.id; document.getElementById('death-modal-overlay').style.display = 'flex';
                }
            }
        }

        let targetCamX = player.x - canvas.width / 2; let targetCamY = player.y - canvas.height / 2;
        camera.x += (targetCamX - camera.x) * 0.08; camera.y += (targetCamY - camera.y) * 0.08;
    }

    function addProgress(val) {
        if (player.type === 5 && !player.isTemp) return; // 真满级
        player.exp += val;
        let currentRealTier = player.isTemp ? 1 : player.type; // 如果是限时的，底层真实等级其实没变，需要计算
        // 简化计算：按当前总经验结算
        
        let need1 = getNeedExp(1); let need2 = getNeedExp(2); let need3 = getNeedExp(3); let need4 = getNeedExp(4);
        
        if(player.exp >= need1 && player.type < TYPE.FOX) { player.exp -= need1; changePlayerType(TYPE.FOX, false); }
        else if(player.exp >= need2 && player.type < TYPE.WOLF) { player.exp -= need2; changePlayerType(TYPE.WOLF, false); }
        else if(player.exp >= need3 && player.type < TYPE.CROC) { player.exp -= need3; changePlayerType(TYPE.CROC, false); }
        else if(player.exp >= need4 && player.type < TYPE.DINO) { player.exp = 9999; changePlayerType(TYPE.DINO, false); }
        
        refreshProgressUI();
    }

    function refreshProgressUI() {
        if (player.type === 5 && !player.isTemp) {
            document.getElementById('progress-fill').style.width = "100%"; document.getElementById('progress-text').innerText = "MAX 顶级掠食者";
        } else {
            let displayTier = player.isTemp ? 1 : player.type; // 临时变身不影响底层黄条
            if(player.exp >= getNeedExp(1)) displayTier = 2;
            if(player.exp >= getNeedExp(1)+getNeedExp(2)) displayTier = 3;
            let need = getNeedExp(displayTier);
            
            // 计算当前级的相对经验
            let relativeExp = player.exp;
            if(displayTier > 1) relativeExp -= getNeedExp(1);
            if(displayTier > 2) relativeExp -= getNeedExp(2);
            if(displayTier > 3) relativeExp -= getNeedExp(3);

            let percent = Math.min(100, (Math.max(0, relativeExp) / need) * 100);
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('progress-text').innerText = `${Math.floor(Math.max(0, relativeExp))} / ${need}`;
        }
    }

    function updateUI(text, color) { const txt = document.getElementById('status-text'); txt.innerText = text; txt.style.color = color; }

    function drawCharacter(ctx, x, y, type, fx, fy, isEnemy = false, isNemesis = false) {
        ctx.save(); ctx.translate(x, y); let angle = Math.atan2(fy, fx); ctx.rotate(angle);
        
        if (type === 1) { // 鸡
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#a4b0be"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#ffa502"; ctx.beginPath(); ctx.moveTo(14, -5); ctx.lineTo(24, 0); ctx.lineTo(14, 5); ctx.fill(); 
            ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(-2, -10, 5, 0, Math.PI*2); ctx.fill(); 
        } 
        else if (type === 2) { // 狐狸
            ctx.fillStyle = isEnemy ? "#e84118" : "#ff7f50"; ctx.strokeStyle = "#d35400"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(22, 0, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(5, -15); ctx.lineTo(-10, -28); ctx.lineTo(-12, -10); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(5, 15);  ctx.lineTo(-10, 28);  ctx.lineTo(-12, 10);  ctx.fill();
        }
        else if (type === 3) { // 狼王
            ctx.fillStyle = "#2f3542"; ctx.strokeStyle = "#1e272e"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#57606f"; ctx.beginPath(); ctx.arc(24, 0, 8, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(5, -20); ctx.lineTo(-12, -35); ctx.lineTo(-15, -12); ctx.fill();
            ctx.beginPath(); ctx.moveTo(5, 20);  ctx.lineTo(-12, 35);  ctx.lineTo(-15, 12);  ctx.fill();
            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(12, -8, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(12, 8, 3, 0, Math.PI*2); ctx.fill(); 
        }
        else if (type === 4) { // 鳄鱼 (统一唯一形态)
            ctx.fillStyle = "#1abc9c"; ctx.strokeStyle = "#16a085"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.ellipse(-10, 0, 40, 20, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 身体
            ctx.fillStyle = "#16a085"; ctx.beginPath(); ctx.rect(10, -10, 35, 20); ctx.fill(); ctx.stroke(); // 嘴巴
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(15, -10); ctx.lineTo(20, -15); ctx.lineTo(25, -10); ctx.fill(); // 牙
            ctx.beginPath(); ctx.moveTo(30, -10); ctx.lineTo(35, -15); ctx.lineTo(40, -10); ctx.fill();
            ctx.fillStyle = "#026c54"; ctx.beginPath(); ctx.arc(-20, -15, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-5, -18, 5, 0, Math.PI*2); ctx.fill();
        }
        else if (type === 5) { // 霸王龙
            ctx.fillStyle = "#d35400"; ctx.strokeStyle = "#8e44ad"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(-10, 0, 60, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#c0392b"; ctx.beginPath(); ctx.moveTo(30, -20); ctx.lineTo(70, -30); ctx.lineTo(70, 0); ctx.lineTo(30, 20); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(20, -30, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.rect(10, 40, 15, -10); ctx.fill(); ctx.stroke();
        }
        ctx.restore();

        if (isNemesis) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = "#ff3838"; ctx.font = "bold 28px Arial"; ctx.textAlign = "center"; ctx.shadowColor = "black"; ctx.shadowBlur = 5;
            ctx.fillText("🎯仇人", 0, - (getEntityProps(type).r + 20 + Math.sin(Date.now()/200)*10));
            ctx.restore();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = "#7bed9f"; ctx.fillRect(camera.x, camera.y, MAP_SIZE, MAP_SIZE); 
        ctx.fillStyle = "#2ed573"; for (let f of foods) { ctx.beginPath(); ctx.arc(f.x, f.y, 5, 0, Math.PI*2); ctx.fill(); }

        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "24px Arial";
        for (let r of runes) {
            let glow = r.rType===2?"#9c88ff":r.rType===3?"#ff4757":r.rType===4?"#1abc9c":"#e67e22";
            ctx.fillStyle = glow; ctx.globalAlpha = 0.5 + Math.sin(Date.now()/150)*0.3; ctx.beginPath(); ctx.arc(r.x, r.y, 25, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
            ctx.shadowColor = glow; ctx.shadowBlur = 10; ctx.fillText(r.emoji, r.x, r.y + 2); ctx.shadowBlur = 0;
        }

        // 具象化石头 (不规则多边形带阴影)
        for (let s of stones) {
            ctx.fillStyle = "#57606f"; ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill(); // 底座阴影
            ctx.fillStyle = "#747d8c"; ctx.beginPath(); 
            ctx.moveTo(s.x - s.radius*0.8, s.y); ctx.lineTo(s.x - s.radius*0.5, s.y - s.radius*0.8); ctx.lineTo(s.x + s.radius*0.5, s.y - s.radius*0.9);
            ctx.lineTo(s.x + s.radius*0.9, s.y); ctx.lineTo(s.x + s.radius*0.4, s.y + s.radius*0.8); ctx.lineTo(s.x - s.radius*0.6, s.y + s.radius*0.6);
            ctx.fill(); 
            ctx.fillStyle = "#a4b0be"; ctx.beginPath(); ctx.arc(s.x-s.radius*0.2, s.y-s.radius*0.3, s.radius*0.3, 0, Math.PI*2); ctx.fill(); // 高光
        }

        // 具象化木箱 (木纹+钉子)
        for (let c of crates) { 
            ctx.fillStyle = "#d1ccc0"; ctx.fillRect(c.x, c.y, c.w, c.h); 
            ctx.strokeStyle = "#84817a"; ctx.lineWidth = 4; ctx.strokeRect(c.x, c.y, c.w, c.h); 
            ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(c.x, c.y+c.h/3); ctx.lineTo(c.x+c.w, c.y+c.h/3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(c.x, c.y+c.h*0.66); ctx.lineTo(c.x+c.w, c.y+c.h*0.66); ctx.stroke();
            ctx.fillStyle = "#2d3436"; ctx.beginPath(); ctx.arc(c.x+6, c.y+6, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(c.x+c.w-6, c.y+6, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(c.x+6, c.y+c.h-6, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(c.x+c.w-6, c.y+c.h-6, 2, 0, Math.PI*2); ctx.fill();
        }

        for (let ai of aiList) {
            let isNemesis = (ai.id === nemesisId); 
            drawCharacter(ctx, ai.x, ai.y, ai.type, ai.faceX, ai.faceY, true, isNemesis);
            if(ai.state === 'flee') { ctx.fillStyle = "#70a1ff"; ctx.beginPath(); ctx.arc(ai.x, ai.y-ai.radius-10, 5, 0, Math.PI*2); ctx.fill(); }
            if(ai.state === 'chase') { ctx.fillStyle = "#ff4757"; ctx.beginPath(); ctx.arc(ai.x, ai.y-ai.radius-10, 6, 0, Math.PI*2); ctx.fill(); }
        }

        for (let eff of player.flashEffects) { ctx.globalAlpha = eff.alpha * 0.3; drawCharacter(ctx, eff.x, eff.y, eff.type, eff.faceX, eff.faceY); }
        ctx.globalAlpha = 1.0;

        if(gameActive) {
            if (player.inBush) ctx.globalAlpha = 0.5;
            drawCharacter(ctx, player.x, player.y, player.type, player.faceX, player.faceY, false); ctx.globalAlpha = 1.0;
            if (player.isTemp) {
                ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial"; ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
                ctx.fillText(Math.ceil(player.tempTimer/60) + "s", player.x, player.y - player.radius - 15); ctx.shadowBlur = 0;
            }
        }

        // 具象化草丛 (由多个半透明圆交叠而成，像茂密的树冠)
        for (let b of bushes) { 
            ctx.globalAlpha = 0.7; ctx.fillStyle = "#2ed573"; 
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1e90ff"; ctx.beginPath(); ctx.arc(b.x-b.r/2, b.y, 4, 0, Math.PI*2); ctx.fill(); // 小花点缀
            ctx.beginPath(); ctx.arc(b.x+b.r/3, b.y-b.r/3, 4, 0, Math.PI*2); ctx.fill();
        } 
        ctx.globalAlpha = 1.0;

        for(let ft of floatingTexts) {
            ctx.globalAlpha = ft.alpha; ctx.fillStyle = ft.color; ctx.font = ft.font; ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 5;
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

        ctx.restore();
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    fullResetGame(); gameLoop(); 
</script>
</body>
</html>
